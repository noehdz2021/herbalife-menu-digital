<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Herbalife - Panel de Administración</title>
    <link rel="stylesheet" href="styles.css?v=1.2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>🌿 Herbalife</h1>
                <span class="user-info" id="userInfo"></span>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" onclick="window.open('display.html', '_blank')">
                    📺 Pantalla
                </button>
                <button class="btn btn-success" onclick="forceDisplayRefresh()" title="Actualiza el pool en la pantalla en &lt;2 s">
                    🔄 Actualizar Display
                </button>
                <button class="btn btn-secondary" onclick="sendDisplayReload()" title="Fuerza F5 en la pantalla (recarga completa)">
                    📺 Recargar pantalla
                </button>
                <button class="btn btn-secondary" onclick="reloadFiles()" title="Recargar archivos">
                    🔃 Recargar
                </button>
                <button class="btn btn-secondary" onclick="logout()">
                    🚪 Cerrar Sesión
                </button>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="upload-tabs">
                    <button class="upload-tab" onclick="showUploadTab('file')" id="tabFile">📤 Subir archivo</button>
                    <button class="upload-tab active" onclick="showUploadTab('url')" id="tabUrl">🔗 Agregar por URL</button>
                </div>
                <div class="upload-section" id="sectionFile" style="display:none">
                    <h3>📤 Subir Archivos</h3>
                    <input type="file" id="fileInput" accept="image/*,video/*" multiple>
                    <select id="fileCategory">
                        <option value="bebidas">Bebidas</option>
                        <option value="productos">Productos</option>
                        <option value="ofertas">Ofertas</option>
                        <option value="informacion">Información</option>
                    </select>
                    <input type="text" id="fileTitle" placeholder="Título">
                    <div class="duration-input">
                        <label>Duración (solo para imágenes):</label>
                        <input type="number" id="fileDuration" min="1" max="60" value="5">
                    </div>
                    <div class="repeat-input">
                        <label>Repetir:</label>
                        <input type="number" id="fileRepeat" min="1" max="10" value="1">
                    </div>
                    <button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()">
                        Subir
                    </button>
                    
                    <!-- Barra de progreso -->
                    <div id="uploadProgress" class="upload-progress-container">
                        <div class="upload-progress-header">
                            <span id="uploadStatus" class="upload-status">Subiendo...</span>
                            <span id="uploadPercent" class="upload-percent">0%</span>
                        </div>
                        <div class="upload-progress-bar-container">
                            <div id="uploadProgressBar" class="upload-progress-bar"></div>
                        </div>
                        <div id="uploadFileName" class="upload-file-name"></div>
                    </div>
                </div>
                <div class="upload-section url-section" id="sectionUrl">
                    <h3>🔗 Agregar por URL</h3>
                    <p class="url-hint">Pega el enlace directo de la imagen o video (ej: Imgur). No usa Supabase Storage.</p>
                    <input type="url" id="urlInput" placeholder="https://i.imgur.com/xxxxx.jpg">
                    <label class="url-checkbox"><input type="checkbox" id="urlIsVideo"> Es video (marca si la URL no tiene extensión)</label>
                    <select id="urlCategory">
                        <option value="bebidas">Bebidas</option>
                        <option value="productos">Productos</option>
                        <option value="ofertas">Ofertas</option>
                        <option value="informacion">Información</option>
                    </select>
                    <input type="text" id="urlTitle" placeholder="Título">
                    <div class="duration-input">
                        <label>Duración (solo imágenes):</label>
                        <input type="number" id="urlDuration" min="1" max="60" value="5">
                    </div>
                    <div class="repeat-input">
                        <label>Repetir:</label>
                        <input type="number" id="urlRepeat" min="1" max="10" value="1">
                    </div>
                    <button class="btn btn-primary btn-url" id="urlBtn" onclick="addByUrl()">
                        Agregar por URL
                    </button>
                </div>
            </div>

            <div class="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total</h3>
                        <p class="stat-number" id="totalImages">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Activas</h3>
                        <p class="stat-number" id="activeImages">0</p>
                    </div>
                </div>

                <div class="images-grid" id="imagesGrid">
                    <div class="no-images">
                        <h3>📷 Sin imágenes</h3>
                        <p>Sube tu primera imagen</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showUploadTab(tab) {
            document.getElementById('sectionFile').style.display = tab === 'file' ? 'block' : 'none';
            document.getElementById('sectionUrl').style.display = tab === 'url' ? 'block' : 'none';
            document.getElementById('tabFile').classList.toggle('active', tab === 'file');
            document.getElementById('tabUrl').classList.toggle('active', tab === 'url');
        }
    </script>
    <script src="config.js?v=1.1"></script>
    <script src="init.js?v=1.3"></script>
    <script src="auth.js?v=1.3"></script>
    <script src="script.js?v=1.3"></script>
    <script>
        // Verificar que los estilos se apliquen correctamente
        document.addEventListener('DOMContentLoaded', function() {
            const refreshButton = document.querySelector('.btn-success');
            if (refreshButton) {
                console.log('✅ Botón de actualización encontrado');
                console.log('Clases del botón:', refreshButton.className);
                console.log('Estilos aplicados:', window.getComputedStyle(refreshButton).backgroundColor);
            } else {
                console.error('❌ Botón de actualización no encontrado');
            }
        });
    </script>
</body>
</html>
